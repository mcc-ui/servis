<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedeker cyklotrás | Jericho Bike</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Leaflet fix pre Shoptet (global img max-width: 100% rozbíja dlaždice) */
.leaflet-container img,
.leaflet-tile,
.leaflet-tile-container img,
.leaflet-overlay-pane img,
.leaflet-marker-pane img,
.leaflet-shadow-pane img {
  max-width: none !important; max-height: none !important;
  width: auto !important; box-shadow: none !important;
  border: none !important; padding: 0 !important; margin: 0 !important;
}
.leaflet-tile { width: 256px !important; height: 256px !important; }

/* ── Premenné */
:root {
  --orange: #f97316;
  --orange-bg: #fff7ed;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-700: #334155;
  --gray-900: #0f172a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
}

/* ── Filter bar */
.filter-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 14px 16px 10px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: sticky; top: 0; z-index: 200;
}
.cat-btn {
  padding: 6px 14px; border-radius: 99px;
  border: 1.5px solid var(--gray-200);
  background: white; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--gray-700);
  transition: all .15s; white-space: nowrap;
}
.cat-btn:hover { border-color: var(--orange); color: var(--orange); }
.cat-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

/* ── Prehľadová mapa */
.overview-wrap {
  margin: 12px 16px;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  overflow: hidden;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.overview-toggle {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px;
  background: white; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--gray-700);
}
.overview-toggle:hover { background: var(--gray-50); }
.toggle-chevron { font-size: 10px; transition: transform .2s; }
.overview-toggle.is-open .toggle-chevron { transform: rotate(180deg); }
.overview-map-body { display: none; }
.overview-map-body.is-open { display: block; }
#overview-map { height: 300px; }

/* ── Loading */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  padding: 56px 16px; color: var(--gray-400); font-size: 14px;
}
.loading-spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--gray-200); border-top-color: var(--orange);
  border-radius: 50%; animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Sieť kariet */
.routes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 14px;
  padding: 12px 16px 28px;
}

/* ── Karta trasy */
.route-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
  transition: box-shadow .2s, transform .2s;
}
.route-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,.1); transform: translateY(-1px); }
.route-card.hidden { display: none; }

.card-head {
  display: flex; align-items: flex-start;
  gap: 10px; padding: 14px 14px 0;
}
.route-num {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
  background: var(--orange); color: white;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.card-head-text { flex: 1; }
.route-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
.card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

/* Badge farby */
.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 11px; font-weight: 600; line-height: 1.6;
}
.b-road    { background: #dbeafe; color: #1d4ed8; }
.b-gravel  { background: #fef3c7; color: #92400e; }
.b-mtb     { background: #dcfce7; color: #15803d; }
.b-family  { background: #ede9fe; color: #6d28d9; }
.b-easy    { background: #dcfce7; color: #15803d; }
.b-medium  { background: #fef9c3; color: #854d0e; }
.b-hard    { background: #fee2e2; color: #b91c1c; }
.b-expert  { background: #1e1b4b; color: #c7d2fe; }

/* Popis */
.card-desc {
  padding: 8px 14px 4px;
  font-size: 13px; color: var(--gray-500); line-height: 1.55;
}

/* Stats chips */
.card-stats { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 14px 12px; }
.chip {
  padding: 3px 9px; border-radius: 6px;
  background: var(--gray-100); border: 1px solid var(--gray-200);
  font-size: 12px; color: var(--gray-700); line-height: 1.5;
}
.chip b { font-weight: 600; color: var(--gray-900); }
.chip-diff { background: var(--orange-bg); border-color: #fed7aa; color: #c2410c; }

/* Mini mapa */
.card-map {
  height: 200px;
  background: var(--gray-100);
  border-top: 1px solid var(--gray-200);
}

/* ── Responsívnosť */
@media (max-width: 520px) {
  .filter-bar { padding: 10px 10px 8px; }
  .cat-btn { padding: 5px 11px; font-size: 12px; }
  .routes-grid { grid-template-columns: 1fr; padding: 8px 10px 20px; gap: 10px; }
  .overview-wrap { margin: 8px 10px; }
}
</style>
</head>

// ═══════════════════════════════════════════════════════
//  Pomocné funkcie (na úrovni skriptu, bez závislosti na maps)
// ═══════════════════════════════════════════════════════
function stars(n) {
  return '<span style="color:#f97316;letter-spacing:1px">'
    + '★'.repeat(n) + '☆'.repeat(4 - n) + '</span>';
}

function catBadges(r) {
  const map = {
    road:   ['Road Bike', 'b-road'],
    gravel: ['Gravel',    'b-gravel'],
    mtb:    ['MTB',       'b-mtb'],
    family: ['Rodinná',   'b-family']
  };
  return getCats(r).map(c => {
    const [lbl, cls] = map[c] || [c, 'b-road'];
    return `<span class="badge ${cls}">${lbl}</span>`;
  }).join('');
}

function diffBadge(r) {
  const cls = ['','b-easy','b-medium','b-hard','b-expert'][r.diff] || 'b-medium';
  return `<span class="badge ${cls}">${stars(r.diff)} ${r.diffLabel}</span>`;
}

function tileLayer(map) {
  return L.tileLayer(
    `https://tile.thunderforest.com/cycle/{z}/{x}/{y}@2x.png?apikey=${TF_KEY}`,
    { attribution: '© <a href="https://www.thunderforest.com/">Thunderforest</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      maxZoom: 18, tileSize: 512, zoomOffset: -1 }
  ).addTo(map);
}

function drawRoute(leafletMap, waypoints, color) {
  const coords = waypoints.map(p => p[1] + ',' + p[0]).join(';');
  fetch('https://router.project-osrm.org/route/v1/cycling/' + coords + '?overview=full&geometries=geojson')
    .then(r => r.json())
    .then(d => {
      if (d.code === 'Ok' && d.routes?.[0]) {
        const line = L.geoJSON(d.routes[0].geometry, { style: { color, weight: 4, opacity: .85 } }).addTo(leafletMap);
        leafletMap.fitBounds(line.getBounds(), { padding: [20, 20] });
      } else {
        L.polyline(waypoints, { color, weight: 3, dashArray: '8,6', opacity: .7 }).addTo(leafletMap);
      }
    })
    .catch(() => {
      L.polyline(waypoints, { color, weight: 3, dashArray: '8,6', opacity: .7 }).addTo(leafletMap);
    });
}

const CAT_COLORS = { road: '#2563eb', gravel: '#b45309', mtb: '#16a34a', family: '#7c3aed' };

const startIcon = L.divIcon({
  html: '<div style="background:#16a34a;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.3)">▶</div>',
  iconSize: [22,22], iconAnchor: [11,11], className: ''
});
const endIcon = L.divIcon({
  html: '<div style="background:#dc2626;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.3)">■</div>',
  iconSize: [22,22], iconAnchor: [11,11], className: ''
});

// ═══════════════════════════════════════════════════════
//  Prehľadová mapa — toggle
// ═══════════════════════════════════════════════════════
let overviewMap = null;

document.getElementById('overviewToggle').addEventListener('click', function() {
  const body = document.getElementById('overviewBody');
  const isOpen = body.classList.toggle('is-open');
  this.classList.toggle('is-open', isOpen);

  if (isOpen && !overviewMap) {
    overviewMap = L.map('overview-map').setView([48.38, 17.08], 11);
    tileLayer(overviewMap);

    routes.forEach(r => {
      const color = CAT_COLORS[getCats(r)[0]] || '#f97316';
      L.circleMarker(r.center, { radius: 7, fillColor: color, color: '#fff', weight: 2, fillOpacity: .9 })
        .addTo(overviewMap)
        .bindPopup(`<b>${r.id}. ${r.name}</b><br>${r.dist} | ${r.elev}<br><em>${r.diffLabel}</em>`);
    });

    // Legenda
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const d = L.DomUtil.create('div');
      d.style.cssText = 'background:#fff;padding:8px 12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.15);font-size:12px;line-height:1.9';
      d.innerHTML = [
        ['#2563eb','Road Bike'], ['#b45309','Gravel'],
        ['#16a34a','MTB'], ['#7c3aed','Rodinné']
      ].map(([c,l]) =>
        `<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${c};margin-right:5px;vertical-align:middle"></span>${l}<br>`
      ).join('');
      return d;
    };
    legend.addTo(overviewMap);
  }

  if (isOpen && overviewMap) {
    setTimeout(() => overviewMap.invalidateSize(), 50);
  }
});

// ═══════════════════════════════════════════════════════
//  Hlavná render funkcia
//  VŠETKY mapy sú vnútri tohto scope — žiadne duplicity
// ═══════════════════════════════════════════════════════
function renderRoutes() {
  const grid = document.getElementById('routes-grid');
  const cardMaps = {};   // id → Leaflet mapa karty

  // ── IntersectionObserver — lazy init máp (funguje aj v iframe)
  const cardObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const id = +el.id.replace('cmap-', '');
      if (cardMaps[id]) { cardObserver.unobserve(el); return; }
      const r = routes.find(x => x.id === id);
      if (!r) return;
      cardObserver.unobserve(el);
      initCardMap(r);
      setTimeout(() => cardMaps[id]?.invalidateSize(), 150);
    });
  }, { rootMargin: '300px 0px' });

  function observeCards() {
    document.querySelectorAll('.card-map').forEach(el => {
      const id = +el.id.replace('cmap-', '');
      if (!cardMaps[id]) cardObserver.observe(el);
    });
  }

  function initCardMap(r) {
    if (cardMaps[r.id]) return;
    const el = document.getElementById('cmap-' + r.id);
    if (!el) return;
    const m = L.map(el, { scrollWheelZoom: false }).setView(r.center, r.zoom);
    tileLayer(m);
    const color = CAT_COLORS[getCats(r)[0]] || '#f97316';
    const isLoop = r.start[0] === r.end[0] && r.start[1] === r.end[1];
    L.marker(r.start, { icon: startIcon }).addTo(m).bindPopup(`<b>Štart</b>${isLoop ? '/Cieľ' : ''}: ${r.name}`);
    if (!isLoop) L.marker(r.end, { icon: endIcon }).addTo(m).bindPopup(`<b>Cieľ:</b> ${r.name}`);
    drawRoute(m, r.waypoints || [r.start, r.end], color);
    cardMaps[r.id] = m;
  }

  // ── Resize
  window.addEventListener('resize', () => {
    Object.values(cardMaps).forEach(m => m?.invalidateSize());
  });

  // ── Render kariet
  grid.innerHTML = '';
  routes.forEach(r => {
    const cats = getCats(r);
    const card = document.createElement('div');
    card.className = 'route-card';
    card.dataset.cats = cats.join(',');

    let statsHtml = `
      <span class="chip"><b>${r.dist}</b> trasa</span>
      <span class="chip"><b>${r.elev}</b> prevýšenie</span>
    `;
    if (r.grade && r.grade !== '—') statsHtml += `<span class="chip"><b>${r.grade}</b> sklon</span>`;
    if (r.maxGrade && r.maxGrade !== '—') statsHtml += `<span class="chip"><b>${r.maxGrade}</b> max. sklon</span>`;
    statsHtml += `<span class="chip">${r.type}</span>`;
    statsHtml += `<span class="chip chip-diff">${stars(r.diff)} ${r.diffLabel}</span>`;

    card.innerHTML = `
      <div class="card-head">
        <div class="route-num">${r.id}</div>
        <div class="card-head-text">
          <div class="route-name">${r.name}</div>
          <div class="card-badges">${catBadges(r)}</div>
        </div>
      </div>
      <p class="card-desc">${r.desc}</p>
      <div class="card-stats">${statsHtml}</div>
      <div class="card-map" id="cmap-${r.id}"></div>
    `;
    grid.appendChild(card);
  });

  observeCards();

  // ── Filtrovanie
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      document.querySelectorAll('.route-card').forEach(card => {
        const cardCats = (card.dataset.cats || '').split(',');
        card.classList.toggle('hidden', cat !== 'all' && !cardCats.includes(cat));
      });
      // Pozoruj nové viditeľné mapy, refreshni existujúce
      observeCards();
      setTimeout(() => Object.values(cardMaps).forEach(m => m?.invalidateSize()), 100);
    });
  });
}

// ═══════════════════════════════════════════════════════
//  Inicializácia — načítaj trasy z GAS, fallback na FALLBACK
// ═══════════════════════════════════════════════════════
let routes = [];

async function init() {
  try {
    const resp = await fetch(ROUTES_API + '?action=getRoutes');
    const json = await resp.json();
    routes = (json.ok && Array.isArray(json.data) && json.data.length > 0)
      ? json.data : FALLBACK;
  } catch (e) {
    routes = FALLBACK;
  }
  document.getElementById('loading').style.display = 'none';
  renderRoutes();
}

init();
</script>
